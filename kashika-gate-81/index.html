<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASHIKA // Global Task & Request Board</title>
    <style>
        :root {
            --bg-color: #060b13;
            --panel-bg: rgba(15, 23, 42, 0.8);
            --border-color: #1e293b;
            --text-color: #f1f5f9;
            --text-muted: #64748b;
            
            /* ロール・緊急度に応じたサイバーカラー */
            --color-scribe: #38bdf8;
            --color-auditor: #fbbf24;
            --color-architect: #a855f7;
            --color-request: #f43f5e;
            --color-success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'SF Pro Display', -apple-system, 'Segoe UI', sans-serif;
            padding: 30px;
            min-height: 100vh;
        }

        /* SF風サイバーグリッド背景 */
        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border-color) 1px, transparent 1px), linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.1; z-index: -1;
        }

        header {
            margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px;
            display: flex; justify-content: space-between; align-items: flex-end;
        }
        header h1 { font-size: 24px; letter-spacing: 2px; font-weight: 800; background: linear-gradient(to right, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: var(--text-muted); font-size: 12px; margin-top: 5px; font-family: monospace; }

        .board-layout {
            display: grid; grid-template-columns: 360px 1fr; gap: 30px; align-items: start;
        }

        /* 左側：要請・タスク起票フォーム */
        .form-panel {
            background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .form-panel h2 { font-size: 16px; margin-bottom: 20px; letter-spacing: 1px; color: #38bdf8; font-family: monospace; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; font-family: monospace; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border-color); border-radius: 6px;
            padding: 10px; color: var(--text-color); font-size: 14px; transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #00f2fe; outline: none; box-shadow: 0 0 10px rgba(0,242,254,0.2);
        }

        .submit-btn {
            width: 100%; background: linear-gradient(135deg, #00f2fe, #4facfe); border: none; padding: 12px;
            border-radius: 6px; color: #000; font-weight: bold; font-size: 14px; cursor: pointer; transition: all 0.3s;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,242,254,0.4); }

        /* 右側：並列タスクマトリクス */
        .task-columns {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }
        .column {
            background: rgba(10, 15, 30, 0.6); border: 1px dashed var(--border-color); border-radius: 12px; padding: 20px; min-height: 600px;
        }
        .column-header { font-size: 14px; font-weight: bold; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; font-family: monospace;}
        
        /* タスクカード */
        .task-card {
            background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 16px;
            margin-bottom: 15px; position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeIn 0.4s ease-out;
        }
        .task-card:hover { border-color: #475569; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ロール（カテゴリ）別インジケーター */
        .card-tag { font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-family: monospace; display: inline-block; margin-bottom: 10px; }
        .tag-scribe { background: rgba(56, 189, 248, 0.15); color: var(--color-scribe); }
        .tag-auditor { background: rgba(251, 191, 36, 0.15); color: var(--color-auditor); }
        .tag-architect { background: rgba(168, 85, 247, 0.15); color: var(--color-architect); }
        .tag-request { background: rgba(244, 63, 94, 0.15); color: var(--color-request); }

        .task-title { font-size: 15px; font-weight: bold; margin-bottom: 6px; line-height: 1.4; }
        .task-desc { font-size: 13px; color: #94a3b8; line-height: 1.5; margin-bottom: 15px; }

        .card-footer {
            display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; font-size: 12px;
        }
        
        /* 応援・要請ボタン */
        .action-btns { display: flex; gap: 10px; }
        .vote-btn {
            background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.3); color: #d8b4fe;
            padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: monospace; transition: all 0.2s;
        }
        .vote-btn:hover { background: rgba(168, 85, 247, 0.3); color: #fff; }

        .resolve-btn {
            background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #6ee7b7;
            padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: all 0.2s;
        }
        .resolve-btn:hover { background: var(--color-success); color: #000; font-weight: bold; }
        
        .author-info { color: var(--text-muted); font-size: 11px; font-family: monospace; }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <header>
        <div>
            <h1>KASHIKA // GLOBAL GRID OPERATOR BOARD</h1>
            <p>プロジェクト未来設計：相互支援・データ要請・完了消し込みパッチシステム</p>
        </div>
        <div style="font-family: monospace; font-size: 12px; color: var(--text-muted);" id="live-counter">ACTIVE ISSUES: --</div>
    </header>

    <div class="board-layout">
        <div class="form-panel">
            <h2>[ 新規応援・要請タスクのデプロイ ]</h2>
            <div class="form-group">
                <label>起票ロール / 分類</label>
                <select id="task-role">
                    <option value="request">🚨 海外へのデータ要請 (GLOBAL REQUEST)</option>
                    <option value="scribe">📝 記述特化 (SCRIBE: 1次ファクトJSON化)</option>
                    <option value="auditor">🔍 査読特化 (AUDITOR: 憲法・ソース査読)</option>
                    <option value="architect">🧠 接続特化 (ARCHITECT: ポインタ格子結合)</option>
                </select>
            </div>
            <div class="form-group">
                <label>タスク / 要請タイトル</label>
                <input type="text" id="task-title" placeholder="例: 台湾886ゲートから2015年vTaiwanデータを要請したい">
            </div>
            <div class="form-group">
                <label>詳細・仕様・1次ソースのURLなど</label>
                <textarea id="task-desc" rows="4" placeholder="具体的な仕様、または『ここを誰か手伝ってくれ！』という応援要請文。"></textarea>
            </div>
            <div class="form-group">
                <label>コントリビューター名 (GitHub IDなど)</label>
                <input type="text" id="task-author" placeholder="rainyurumo-nishioka">
            </div>
            <button class="submit-btn" onclick="createTask()">グリッドへパッチを当てる (SUBMIT)</button>
        </div>

        <div class="task-columns">
            <div class="column">
                <div class="column-header">
                    <span style="color: #ef4444;">📡 稼働中の要請・応援待ち (ACTIVE GRID)</span>
                    <span id="active-count" style="background:rgba(255,255,255,0.05); padding:2px 6px; border-radius:4px;">0</span>
                </div>
                <div id="active-tasks-container"></div>
            </div>

            <div class="column" style="background: rgba(0,0,0,0.2);">
                <div class="column-header">
                    <span style="color: var(--color-success);">✅ 完了・格子マージ済 (MERGED ARCHIVE)</span>
                    <span id="merged-count" style="background:rgba(255,255,255,0.05); padding:2px 6px; border-radius:4px;">0</span>
                </div>
                <div id="merged-tasks-container"></div>
            </div>
        </div>
    </div>

    <script>
        // 未来設計ロードマップに基づく初期コアタスク
        let initialTasks = [
            {
                id: 1, role: "scribe", title: "【タスクA】GHQ占領期セクターのリアル農地改革データの削り出し",
                desc: "農林省告示第104号の、実際の再分配面積「2,000,000町歩」に関する1次ソース（国会図書館デジタルコレクション）のURLをJSONに埋め込む作業のヘルプ要請！",
                author: "rainyurumo-nishioka", votes: 8, status: "active"
            },
            {
                id: 2, role: "request", title: "【タスクA】エストニア（国番号372）のi-Voting実績データの提供要請",
                desc: "2005年のi-Voting導入に伴う「投票コスト削減率」の1次統計データデータ構造を持っている海外ギーク、誰かkashika-gate-372を作ってマージしてくれ！",
                author: "Architect-Core", votes: 14, status: "active"
            },
            {
                id: 3, role: "architect", title: "【タスクC】マージエンジンのMockから実Fetch APIへの換装",
                desc: "現在index.html内部のローカルオブジェクトで処理している他国JSONの結合ロジックを、本物のGitHub raw URLからfetchするコードへリファクタリングする案件。",
                author: "rainyurumo-nishioka", votes: 5, status: "active"
            }
        ];

        // ローカルストレージ（ブラウザ保存）からデータを復元、無ければ初期タスクを使用
        let tasks = JSON.parse(localStorage.getItem('kashika_tasks')) || initialTasks;

        function renderBoard() {
            const activeContainer = document.getElementById('active-tasks-container');
            const mergedContainer = document.getElementById('merged-tasks-container');
            
            activeContainer.innerHTML = "";
            mergedContainer.innerHTML = "";

            let activeCount = 0;
            let mergedCount = 0;

            tasks.forEach(task => {
                const card = document.createElement('div');
                card.className = "task-card";
                
                // ロール別タグのクラス判定
                let tagClass = `tag-${task.role}`;
                let tagLabel = task.role === 'request' ? '🚨 REQUEST' : `🧬 ${task.role}`;

                let footerContent = "";
                if (task.status === 'active') {
                    activeCount++;
                    footerContent = `
                        <div class="author-info">by @${task.author}</div>
                        <div class="action-btns">
                            <button class="vote-btn" onclick="voteTask(${task.id})">🔥 応援 (${task.votes})</button>
                            <button class="resolve-btn" onclick="resolveTask(${task.id})">完了・消去</button>
                        </div>
                    `;
                } else {
                    mergedCount++;
                    card.style.opacity = "0.4";
                    card.style.borderStyle = "dashed";
                    footerContent = `
                        <div class="author-info" style="color:var(--color-success)">✓ GRID MERGED</div>
                        <div style="font-size:11px; color:var(--text-muted); font-family:monospace;">Votes: ${task.votes}</div>
                    `;
                }

                card.innerHTML = `
                    <span class="card-tag ${tagClass}">${tagLabel}</span>
                    <div class="task-title">${task.title}</div>
                    <div class="task-desc">${task.desc}</div>
                    <div class="card-footer">
                        ${footerContent}
                    </div>
                `;

                if (task.status === 'active') {
                    activeContainer.appendChild(card);
                } else {
                    mergedContainer.appendChild(card);
                }
            });

            // 各種カウンターの同期
            document.getElementById('active-count').innerText = activeCount;
            document.getElementById('merged-count').innerText = mergedCount;
            document.getElementById('live-counter').innerText = `ACTIVE ISSUES: ${activeCount}`;
            
            // 状態をローカルストレージへ保存
            localStorage.setItem('kashika_tasks', JSON.stringify(tasks));
        }

        // タスク起票ロジック
        function createTask() {
            const role = document.getElementById('task-role').value;
            const title = document.getElementById('task-title').value.trim();
            const desc = document.getElementById('task-desc').value.trim();
            const author = document.getElementById('task-author').value.trim() || "anonymous";

            if (!title || !desc) {
                alert("要請タイトルおよび詳細を入力してください。");
                return;
            }

            const newTask = {
                id: Date.now(),
                role: role,
                title: title,
                desc: desc,
                author: author,
                votes: 0,
                status: "active"
            };

            tasks.unshift(newTask);
            renderBoard();

            // フォームのクリア
            document.getElementById('task-title').value = "";
            document.getElementById('task-desc').value = "";
            document.getElementById('task-author').value = "";
        }

        // 応援（投票）ボタンのインクリメント
        function voteTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.votes++;
                renderBoard();
            }
        }

        // タスクの完了消し込み（マージ）
        function resolveTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.status = "merged";
                renderBoard();
            }
        }

        // 初回レンダリング
        window.onload = function() {
            renderBoard();
        };
    </script>
</body>
</html>
